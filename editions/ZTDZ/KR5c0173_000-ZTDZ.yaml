front:
  text: 章獻明肅皇后受上清畢法籙記
  hash: sha256:1725871ff004f6ca5cfb69abba06dca43b6ac1e34360169c310bcc52464197f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0173_SJB_000-180042c, image: sjb/18/180042c.png}
body:
  text: 臨壇度師上清大洞法師賜紫臣朱自英撰皇宋應運之四葉聖君在宥之三年聖母皇太后劉氏九靈分粹三元毓神之三流光開泰之期握寳盛眀之化内以肅雍九族外以緝熈庶政萬機之暇宅心虚無之表凝神太漠之鄉金妃拂筵干琳碧之堂玉華散馨于虚白之室而又澄神澹思誦黄庭二景之經志意内修晨夕忘倦豈獨拘䰟制𩲸上符髙聖之言蓋亦務本還淳下䕃普天之衆于以觀三素思九眞揖儀璘翫璫珮南眞依俙而宻盻西母彷彿以㝠觀肹蠁之應繼日而昭積累之功卜年而進信乎仙可學而道不虚行矣仍念研精尚鮮未臻道源聞南嶽紫虛元君魏夫人昔以東晋興寧元年甲子歲先小有天王清虛王眞人所受上清大洞寳經靈文祕籙降傅于茅山東華上佐司命楊眞人洎上清仙候許長史迄後靈源眞系繼踵茅峯道葉仙枝流芳寰海繇是乃詔玉清昭應宮羽人冲妙大師皇甫希及等𦣱王魏之文研楊許之迹得上清三品神經玉清隱書九清衆祕洎金神二虎八景玉籙上皇玉諱元始譜籙流金火鈴迴車畢道三元玉檢九鳳靈章紫紋白帶太微黄書瓊宮靈飛等籙共一十卷金仙玉馬等一十五卷依科備辦金龍玉魚金羊銀鴈青絲金紐雲錦鳯紋南和之素碧霞拂塵之羅絳章落尸之帛四䂓眀照景震靈劔五色繒綵脫世衣裳上清法服盟文禮物莫不周悉先遣中使齎密辭往南嶽𦤺告于紫虚元君默允㝠㫖續命入内内侍省内西頭供奉官臣康從政入内内侍省内侍殿頭句當御藥院臣江德用并詔右街副道録知玉清昭應宮事同管句左右街教門公事冲眞大師賜紫臣李知損左街都監壽寜觀住持眀眞大師賜紫臣石知章玉清昭應宮副直歲宣教大師賜紫臣周遂良玉清昭應宮住持冲妙大師賜紫臣皇甫希及玉清昭應宮住持冲袐大師賜紫臣薛清和等同齎青詞黄素一行禮信就江寧府茅山崇禧觀開建上清皇壇預啓玉籙道場七晝夜散日設醮三百六十分依科傅受訖别設謝恩道場三晝夜設闔山道士女冠大齋一中投送金龍玉簡金鐶玉魚于華陽洞鷰洞金山水府于以告盟七聖于以致誠九清伸授受之儀罄師資之禮也始以輶軒至日靈鶴低迎於羽葆當建齎之夕霱雲遠布於霄空洎宿露眞文以析感預陳精檮以伸欵蘭膏晃爾星月粲然百神受𨤲以效祥五嶽衛靈而薦祉至中夜輕風颯至驟兩霈然須臾之頃銀漢森列皓𩲸皎如咸云風伯掃壇兩師灑席觀其所以不亦宜乎及啓傳之旦九霞流光之輝熠爍而凝照三素飛煙之氣縹緲以浮空飊欻萃焉霓旌煥焉羽儀侁焉萬靈肅焉當分金列契之際皓鶴翶翔于壇上紅霞分繞於空中蕙風襲人靈芬郁野觀者如堵莫不欣歎矧夫衆妙多門而學則有序至神無方而感則無待斯以見我后之用心也之精誠也符徤順服人神降靈仙契㝠奥非浩劫崇累之徳積生至尚之果其執能臻於此焉是知令乎善始則美克有終謀之以道何患不臧若然者八景飛霞之輦三元流雲之宴十精回水之珍九色鳯腦之饌将靡日而𦤺之矣恭惟聖念奉若祕文蓋欲昭事昊穹保寧眞主固宗祊於萬載福民庶之三登永戢干戈同承冨壽者也至於後天之筭無疆之祚金枝之逺蒼生之賜不其冝哉觀一代之能事考百王之未書謹直筆以記之時天聖二年甲子歲四月戊午朔二十三日庚辰記章獻明肅皇后受上清畢法籙記
